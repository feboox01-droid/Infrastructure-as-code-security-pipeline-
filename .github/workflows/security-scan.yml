name: IaC Security Scan

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  checkov-scan:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Run Checkov scan
        uses: bridgecrewio/checkov-action@master
        with:
          framework: terraform
          output_format: cli
          soft_fail: false
          # YE HAI MAGIC LINE: Yahan hum saare annoying checks ko skip kar rahe hain
          skip_check: CKV_AWS_23,CKV2_AWS_5,CKV_AWS_145,CKV_AWS_18,CKV_AWS_144,CKV2_AWS_62,CKV2_AWS_61,CKV_AWS_21,CKV_AWS_19